[base]
package = ocean
env_name = puffer_ctf
policy_name = Policy
rnn_name = Recurrent

[vec]
num_envs = 128
num_workers = 16
batch_size = 32
zero_copy = False
backend = Multiprocessing

[env]
num_envs = 128

[train]
device = cpu
env_batch_size = 32
batch_size = auto
bptt_horizon = 64
minibatch_size = 16384
total_timesteps = 100_000_000
use_rnn = true
hidden_size = 256
learning_rate = 0.0114
gamma = 0.989
ent_coef = 0.0134

# Reward shaping from our most successful run (Iteration 7)
use_reward_wrapper = true
reward_move_to_enemy = 0.1
reward_move_to_own = 0.2
reward_flag_hold = 0.01
penalty_tagged = -0.5
penalty_step = 0.0
penalty_wall = -0.01
