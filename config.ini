[base]
package = ocean
env_name = puffer_ctf
policy_name = Policy
rnn_name = Recurrent

[vec]
num_envs = 128
num_workers = 16
batch_size = 32
zero_copy = False
backend = Multiprocessing

[env]
num_envs = 128

[train]
device = cpu
env_batch_size = 32
batch_size = auto
bptt_horizon = 32
minibatch_size = 16384
total_timesteps = 100_000_000
use_rnn = true
hidden_size = 128
learning_rate = 0.002
gamma = 0.999
ent_coef = 0.05

# Adam hyperparameters for stability
adam_beta1 = 0.97
adam_beta2 = 0.9999
adam_eps = 4e-7

# Reward shaping - "Compass" Discovery Strategy
use_reward_wrapper = false
reward_move_to_enemy = 0.2
reward_move_to_own = 0.4
reward_flag_hold = 0.1
penalty_tagged = -0.5
penalty_step = 0.0
penalty_wall = -0.01
