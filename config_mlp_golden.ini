[base]
package = ocean
env_name = puffer_ctf
policy_name = Policy
rnn_name = Recurrent

[vec]
num_envs = 128
num_workers = 16
batch_size = 128
zero_copy = False
backend = Multiprocessing

[env]
num_envs = 128

[train]
device = cpu
env_batch_size = 32
# Consistent with successful Iteration 3
batch_size = 8192
minibatch_size = 1024
bptt_horizon = 16
total_timesteps = 15_000_000
checkpoint_interval = 50
use_rnn = false
hidden_size = 256
learning_rate = 0.005
gamma = 0.995
ent_coef = 0.01
# Use original "soft" reward shaping that worked
use_reward_wrapper = true
reward_move_to_enemy = 0.01
reward_move_to_own = 0.05
reward_flag_hold = 0.01
penalty_tagged = -0.5
penalty_step = -0.001
